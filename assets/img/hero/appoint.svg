<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <linearGradient id="cal-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06D6D4"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
    <filter id="cal-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Calendar body -->
  <rect x="40" y="45" width="120" height="100" rx="16" fill="url(#cal-grad)" opacity="0.15" stroke="url(#cal-grad)" stroke-width="2.5" filter="url(#cal-glow)"/>
  <!-- Calendar top bar -->
  <rect x="40" y="45" width="120" height="35" rx="16" fill="url(#cal-grad)" opacity="0.5"/>
  <!-- Calendar hooks -->
  <rect x="72" y="32" width="8" height="24" rx="4" fill="#06D6D4" filter="url(#cal-glow)"/>
  <rect x="120" y="32" width="8" height="24" rx="4" fill="#06D6D4" filter="url(#cal-glow)"/>
  <!-- Calendar dots (6) -->
  <circle cx="72" cy="100" r="6" fill="#0066FF"/>
  <circle cx="100" cy="100" r="6" fill="#0066FF"/>
  <circle cx="128" cy="100" r="6" fill="#0066FF"/>
  <circle cx="72" cy="125" r="6" fill="#0066FF"/>
  <circle cx="100" cy="125" r="6" fill="#0066FF"/>
  <circle cx="128" cy="125" r="6" fill="#0066FF"/>
  <!-- Label -->
  <text x="100" y="175" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="16" fill="#ffffff">Appointments</text>
  <text x="100" y="195" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="16" fill="#ffffff">Managed</text>
</svg>
