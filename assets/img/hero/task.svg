<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" fill="none">
  <defs>
    <linearGradient id="task-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#06D6D4"/>
    </linearGradient>
    <filter id="task-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark card body -->
  <rect x="35" y="20" width="130" height="140" rx="20" fill="#0D1F15" stroke="url(#task-grad)" stroke-width="2" filter="url(#task-glow)"/>
  <!-- Row 1: checkbox + lines -->
  <rect x="55" y="50" width="28" height="28" rx="6" fill="#0A1A10" stroke="url(#task-grad)" stroke-width="1.5"/>
  <path d="M62,64 L68,70 L78,56" fill="none" stroke="url(#task-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="95" y="55" width="50" height="5" rx="2.5" fill="url(#task-grad)" opacity="0.8"/>
  <rect x="95" y="66" width="35" height="5" rx="2.5" fill="url(#task-grad)" opacity="0.5"/>
  <!-- Row 2: checkbox + lines -->
  <rect x="55" y="95" width="28" height="28" rx="6" fill="#0A1A10" stroke="url(#task-grad)" stroke-width="1.5"/>
  <path d="M62,109 L68,115 L78,101" fill="none" stroke="url(#task-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="95" y="100" width="50" height="5" rx="2.5" fill="url(#task-grad)" opacity="0.8"/>
  <rect x="95" y="111" width="35" height="5" rx="2.5" fill="url(#task-grad)" opacity="0.5"/>
  <!-- Label -->
  <text x="100" y="190" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="15" fill="#ffffff">Tasks Completed</text>
</svg>
