<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" fill="none">
  <defs>
    <linearGradient id="mail-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06D6D4"/>
      <stop offset="100%" stop-color="#4488FF"/>
    </linearGradient>
    <filter id="mail-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Envelope body -->
  <rect x="25" y="40" width="150" height="105" rx="16" fill="url(#mail-grad)" opacity="0.12" stroke="url(#mail-grad)" stroke-width="2.5" filter="url(#mail-glow)"/>
  <!-- Envelope flap -->
  <path d="M25,56 L100,105 L175,56" fill="none" stroke="url(#mail-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#mail-glow)"/>
  <!-- Bottom V -->
  <path d="M25,145 L100,105 L175,145" fill="none" stroke="url(#mail-grad)" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <!-- Label -->
  <text x="100" y="180" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="16" fill="#ffffff">Inbox Zero</text>
</svg>
