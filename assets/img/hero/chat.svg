<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" fill="none">
  <defs>
    <linearGradient id="chat-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#06D6D4"/>
    </linearGradient>
    <filter id="chat-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Back bubble (darker, smaller, offset right) -->
  <rect x="75" y="40" width="100" height="75" rx="18" fill="#0A1520" stroke="#0A5060" stroke-width="1.5" opacity="0.7"/>
  <!-- Front bubble (main) -->
  <path d="M30,35 h110 a18,18 0 0,1 18,18 v50 a18,18 0 0,1 -18,18 h-70 l-22,22 v-22 h-18 a18,18 0 0,1 -18,-18 v-50 a18,18 0 0,1 18,-18 z" fill="#081520" stroke="url(#chat-grad)" stroke-width="2.5" filter="url(#chat-glow)"/>
  <!-- Three dots -->
  <circle cx="62" cy="78" r="5" fill="#88CCFF" filter="url(#chat-glow)"/>
  <circle cx="88" cy="78" r="5" fill="#AADDFF" filter="url(#chat-glow)"/>
  <circle cx="114" cy="78" r="5" fill="#22D3EE" filter="url(#chat-glow)"/>
  <!-- Label -->
  <text x="100" y="180" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="15" fill="#06B6D4">Client Follow-Ups</text>
</svg>
